# BitAPI - Single-container deployment
# Backend serves API + static frontend, no separate Nginx needed.
#
# First-time setup:
#   1. cp .env.example .env
#   2. Edit .env (set JWT secret, admin email/password, etc.)
#   3. docker compose up -d
#   4. Admin login at http://localhost:8091/auth/login

services:
  bitapi:
    build: .
    container_name: bitapi
    restart: unless-stopped
    ports:
      - "${BITAPI_HTTP_PORT:-8091}:8091"
    environment:
      - BITAPI_APP_NAME=${BITAPI_APP_NAME:-BitAPI}
      - BITAPI_ENV=${BITAPI_ENV:-production}
      - BITAPI_HTTP_ADDR=:8091
      - BITAPI_DATABASE_DSN=file:/app/data/bitapi.db?_foreign_keys=on&_busy_timeout=5000
      - BITAPI_JWT_SECRET=${BITAPI_JWT_SECRET:-change-me-in-production}
      - BITAPI_ACCESS_TOKEN_TTL=${BITAPI_ACCESS_TOKEN_TTL:-30m}
      - BITAPI_REFRESH_TOKEN_TTL=${BITAPI_REFRESH_TOKEN_TTL:-336h}
      - BITAPI_CORS_ORIGINS=${BITAPI_CORS_ORIGINS:-http://localhost:8091,http://127.0.0.1:8091}
      - BITAPI_BOOTSTRAP_EMAIL=${BITAPI_BOOTSTRAP_EMAIL:-admin@bitapi.local}
      - BITAPI_BOOTSTRAP_PASSWORD=${BITAPI_BOOTSTRAP_PASSWORD:-bitapi-admin}
      - BITAPI_BOOTSTRAP_NAME=${BITAPI_BOOTSTRAP_NAME:-BitAPI 管理员}
      - BITAPI_ENCRYPTION_KEY=${BITAPI_ENCRYPTION_KEY:-dev-bitapi-encryption-key-32bytes}
      - BITAPI_DEFAULT_USER_BALANCE_MICROS=${BITAPI_DEFAULT_USER_BALANCE_MICROS:-0}
    volumes:
      - bitapi_data:/app/data
      - bitapi_uploads:/app/data/uploads

volumes:
  bitapi_data:
  bitapi_uploads: